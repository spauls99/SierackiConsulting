<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Map Examples - My Simple GIS Site</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    #map {
      height: 500px;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>Map Examples</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="map-examples.html">Map Examples</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main>
    <h2>Basic Interactive Map</h2>
    <p>This map uses Leaflet with free OpenStreetMap tiles.</p>

    <div id="map"></div>
  </main>

  <footer>
    <p>&copy; 2026 My GIS Site</p>
  </footer>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    // Initialize map
    const map = L.map('map').setView([47.966, -116.911], 12); // Priest River-ish

    // Base layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Example marker
    L.marker([47.966, -116.911])
      .addTo(map)
      .bindPopup('Example location')
      .openPopup();
  </script>
</body>
</html>
